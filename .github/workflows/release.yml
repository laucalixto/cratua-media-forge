name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system deps
        run: sudo apt update && sudo apt install -y libx11-dev libgl-dev libasound2-dev
      - name: Build release
        run: cargo build --release
      - name: Strip binary
        run: strip target/release/mediaforge
      - name: Package
        run: |
          mkdir -p dist/mediaforge-linux
          cp target/release/mediaforge dist/mediaforge-linux/
          cp README.md dist/mediaforge-linux/ 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: mediaforge-linux
          path: dist/mediaforge-linux/

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu
      - name: Install mingw
        run: sudo apt update && sudo apt install -y mingw-w64
      - name: Build release
        run: cargo build --release --target x86_64-pc-windows-gnu
      - name: Strip binary
        run: x86_64-w64-mingw32-strip target/x86_64-pc-windows-gnu/release/mediaforge.exe
      - name: Package
        run: |
          mkdir -p dist/mediaforge-windows
          cp target/x86_64-pc-windows-gnu/release/mediaforge.exe dist/mediaforge-windows/
          cp README.md dist/mediaforge-windows/ 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: mediaforge-windows
          path: dist/mediaforge-windows/

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: mediaforge-linux
          path: linux
      - uses: actions/download-artifact@v4
        with:
          name: mediaforge-windows
          path: windows
      - name: Create archives
        run: |
          cd linux && tar czf ../mediaforge-linux-x86_64.tar.gz * && cd ..
          cd windows && zip -r ../mediaforge-windows-x86_64.zip * && cd ..
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mediaforge-linux-x86_64.tar.gz
            mediaforge-windows-x86_64.zip
          generate_release_notes: true
